<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lenovo RecoverySync</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@300;400;500&family=Exo+2:ital,wght@0,200;0,300;0,400;0,600;0,800;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --c1: #e3e6ed;
    --c2: #b0b9ce;
    --c3: #7e8caf;
    --c4: #546287;
    --c5: #353e55;
    --c6: #151923;
    --c6b: #0f1219;
    --accent: #5b7fd4;
    --accent2: #3a5ca8;
    --glow: rgba(91,127,212,0.18);
    --warn: #e05c5c;
    --success: #4caf8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--c6);
    color: var(--c1);
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--c6b); }
  ::-webkit-scrollbar-thumb { background: var(--c4); border-radius: 3px; }

  /* ─── CIRCUIT BACKGROUND ─── */
  .circuit-bg {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .circuit-bg svg { width: 100%; height: 100%; opacity: 0.07; }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 var(--glow); }
    50%      { box-shadow: 0 0 18px 4px var(--glow); }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }
  @keyframes scanline {
    0%   { top: -4%; }
    100% { top: 104%; }
  }
  @keyframes blinkDot {
    0%,100% { opacity: 1; }
    50%     { opacity: 0.2; }
  }
  @keyframes slideIn {
    from { transform: translateX(-20px); opacity:0; }
    to   { transform: translateX(0); opacity:1; }
  }
  @keyframes bodypartGlow {
    0%,100% { filter: drop-shadow(0 0 4px var(--accent)); }
    50%      { filter: drop-shadow(0 0 14px #7fa8ff); }
  }
  @keyframes notifSlide {
    from { transform: translateX(110%); opacity:0; }
    to   { transform: translateX(0); opacity:1; }
  }
  @keyframes progressFill {
    from { width: 0%; }
    to   { width: var(--target-w); }
  }

  /* ─── LANDING ─── */
  .landing {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    position: relative; z-index: 1; padding: 40px 20px;
  }
  .landing-logo {
    display: flex; align-items: center; gap: 18px; margin-bottom: 48px;
    animation: fadeUp 0.8s ease both;
  }
  .logo-icon {
    width: 72px; height: 72px; border-radius: 50%;
    border: 2px solid var(--c3);
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 30% 30%, var(--c5), var(--c6b));
    animation: pulse 3s infinite;
  }
  .logo-icon svg { width: 44px; height: 44px; }
  .logo-text h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2.4rem; font-weight: 700; letter-spacing: 2px;
    color: var(--c1); line-height: 1;
  }
  .logo-text h1 span { color: var(--accent); }
  .logo-text p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; color: var(--c3); letter-spacing: 3px;
    text-transform: uppercase; margin-top: 2px;
  }
  .landing-tagline {
    text-align: center; max-width: 500px; margin-bottom: 48px;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .landing-tagline h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem; font-weight: 300; color: var(--c2);
    letter-spacing: 1px; line-height: 1.5;
  }
  .landing-tagline h2 strong { color: var(--c1); font-weight: 600; }
  .landing-btns {
    display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;
    animation: fadeUp 0.8s 0.4s ease both;
  }
  .btn {
    font-family: 'Rajdhani', sans-serif; font-size: 1rem; font-weight: 600;
    letter-spacing: 2px; text-transform: uppercase; padding: 13px 36px;
    border: none; cursor: pointer; border-radius: 3px;
    transition: all 0.22s;
    position: relative; overflow: hidden;
  }
  .btn::after {
    content: ''; position: absolute; inset: 0;
    background: rgba(255,255,255,0.06);
    transform: translateX(-100%);
    transition: transform 0.3s;
  }
  .btn:hover::after { transform: translateX(0); }
  .btn-primary {
    background: var(--accent); color: #fff;
    box-shadow: 0 2px 20px rgba(91,127,212,0.35);
  }
  .btn-primary:hover { background: #6e90e0; box-shadow: 0 2px 30px rgba(91,127,212,0.5); }
  .btn-outline {
    background: transparent; color: var(--c2);
    border: 1px solid var(--c4);
  }
  .btn-outline:hover { border-color: var(--c2); color: var(--c1); }
  .btn-sm { padding: 8px 20px; font-size: 0.82rem; }
  .btn-danger { background: var(--warn); color: #fff; }
  .btn-danger:hover { background: #e87070; }

  .demo-badge {
    margin-top: 48px;
    animation: fadeUp 0.8s 0.6s ease both;
    padding: 10px 24px; border: 1px solid var(--c5);
    border-radius: 2px; background: rgba(21,25,35,0.7);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem; color: var(--c3); letter-spacing: 1px;
    text-align: center;
  }
  .demo-badge span { color: var(--warn); }

  /* ─── AUTH MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(10,13,20,0.85); backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .modal-box {
    background: var(--c6);
    border: 1px solid var(--c5);
    border-top: 2px solid var(--accent);
    border-radius: 4px;
    padding: 40px 44px; width: 100%; max-width: 420px;
    position: relative; animation: fadeUp 0.3s ease;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-close {
    position: absolute; top: 14px; right: 18px;
    background: none; border: none; color: var(--c4);
    font-size: 1.4rem; cursor: pointer; line-height: 1;
    transition: color 0.2s;
  }
  .modal-close:hover { color: var(--c1); }
  .modal-box h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.6rem; font-weight: 700; letter-spacing: 1px;
    color: var(--c1); margin-bottom: 6px;
  }
  .modal-box .subtitle {
    font-size: 0.82rem; color: var(--c3); margin-bottom: 28px;
    font-family: 'IBM Plex Mono', monospace; letter-spacing: 0.5px;
  }
  .modal-demo-note {
    background: rgba(224,92,92,0.1); border: 1px solid rgba(224,92,92,0.3);
    border-radius: 3px; padding: 10px 14px; margin-bottom: 22px;
    font-size: 0.74rem; color: #e08080; line-height: 1.5;
    font-family: 'IBM Plex Mono', monospace;
  }
  .modal-demo-note strong { color: var(--warn); }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block; font-size: 0.72rem; letter-spacing: 2px;
    text-transform: uppercase; color: var(--c3); margin-bottom: 7px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .form-group input, .form-group textarea, .form-group select {
    width: 100%; background: var(--c6b); border: 1px solid var(--c5);
    border-radius: 3px; padding: 11px 14px;
    color: var(--c1); font-family: 'Exo 2', sans-serif; font-size: 0.95rem;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
  .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
    border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow);
  }
  .form-group textarea { resize: vertical; min-height: 100px; }
  .form-group select { appearance: none; cursor: pointer; }
  .form-error { color: var(--warn); font-size: 0.78rem; margin-top: 5px; }
  .form-success { color: var(--success); font-size: 0.78rem; margin-top: 5px; }
  .modal-switch {
    text-align: center; margin-top: 18px;
    font-size: 0.82rem; color: var(--c3);
  }
  .modal-switch button {
    background: none; border: none; color: var(--accent);
    cursor: pointer; font-size: 0.82rem; text-decoration: underline;
    font-family: 'Exo 2', sans-serif;
  }

  /* ─── DASHBOARD SHELL ─── */
  .app-shell {
    display: flex; height: 100vh; position: relative; z-index: 1;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 230px; flex-shrink: 0;
    background: linear-gradient(180deg, var(--c6b) 0%, #0a0e17 100%);
    border-right: 1px solid var(--c5);
    display: flex; flex-direction: column;
    padding: 0; position: relative;
    overflow: hidden;
  }
  .sidebar::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
    background: linear-gradient(180deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }
  .sidebar-header {
    padding: 22px 20px 18px;
    border-bottom: 1px solid var(--c5);
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-logo .logo-icon { width: 36px; height: 36px; animation: none; }
  .sidebar-logo .logo-icon svg { width: 22px; height: 22px; }
  .sidebar-logo-text h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.05rem; font-weight: 700; letter-spacing: 1px; color: var(--c1);
    line-height: 1;
  }
  .sidebar-logo-text h3 span { color: var(--accent); }
  .sidebar-logo-text p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.52rem; color: var(--c4); letter-spacing: 2px; margin-top: 1px;
  }
  .sidebar-user {
    padding: 14px 20px 12px;
    border-bottom: 1px solid rgba(53,62,85,0.5);
  }
  .sidebar-user p {
    font-size: 0.72rem; color: var(--c4); letter-spacing: 1px;
    font-family: 'IBM Plex Mono', monospace; margin-bottom: 4px;
  }
  .sidebar-user strong { font-size: 0.95rem; color: var(--c2); font-family: 'Rajdhani', sans-serif; font-weight: 600; letter-spacing: 1px; }
  .sidebar-nav { padding: 14px 10px; flex: 1; }
  .sidebar-nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 14px; border-radius: 3px; margin-bottom: 3px;
    cursor: pointer; transition: all 0.18s;
    color: var(--c3); font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; font-weight: 600; letter-spacing: 1.5px;
    text-transform: uppercase; border: 1px solid transparent;
    position: relative;
  }
  .sidebar-nav-item:hover { background: rgba(91,127,212,0.08); color: var(--c2); }
  .sidebar-nav-item.active {
    background: rgba(91,127,212,0.14); color: var(--c1);
    border-color: rgba(91,127,212,0.3);
  }
  .sidebar-nav-item.active::after {
    content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60%; background: var(--accent); border-radius: 2px;
  }
  .sidebar-nav-icon { width: 18px; height: 18px; flex-shrink: 0; opacity: 0.8; }
  .sidebar-footer {
    padding: 14px 10px; border-top: 1px solid var(--c5);
  }

  /* ─── MAIN ─── */
  .main-area {
    flex: 1; overflow-y: auto; position: relative;
    background: radial-gradient(ellipse at 70% 10%, rgba(84,98,135,0.07) 0%, transparent 60%),
                var(--c6);
  }
  .main-header {
    padding: 22px 34px 18px;
    border-bottom: 1px solid var(--c5);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(21,25,35,0.6);
    backdrop-filter: blur(4px);
    position: sticky; top: 0; z-index: 10;
  }
  .main-header h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.5rem; font-weight: 700; letter-spacing: 2px;
    color: var(--c1); text-transform: uppercase;
  }
  .main-header .breadcrumb {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; color: var(--c4); letter-spacing: 2px; margin-top: 2px;
  }
  .main-header .header-actions { display: flex; align-items: center; gap: 14px; }
  .status-indicator {
    display: flex; align-items: center; gap: 7px;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--c3);
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  }
  .dot-green { background: var(--success); animation: blinkDot 2s infinite; }
  .dot-blue  { background: var(--accent);  animation: blinkDot 2.5s infinite; }
  .dot-warn  { background: var(--warn); animation: blinkDot 1.5s infinite; }
  .main-content { padding: 28px 34px; }

  /* ─── CARDS ─── */
  .card {
    background: rgba(21,25,35,0.7); border: 1px solid var(--c5);
    border-radius: 4px; padding: 22px 24px;
    transition: border-color 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .card:hover { border-color: var(--c4); }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.95rem; font-weight: 700; letter-spacing: 2px;
    text-transform: uppercase; color: var(--c2);
    display: flex; align-items: center; gap: 8px;
  }
  .card-title .dot { width: 5px; height: 5px; }
  .card-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem; padding: 3px 9px;
    border-radius: 2px; letter-spacing: 1px; text-transform: uppercase;
  }
  .badge-blue { background: rgba(91,127,212,0.18); color: var(--accent); border: 1px solid rgba(91,127,212,0.3); }
  .badge-green { background: rgba(76,175,138,0.15); color: var(--success); border: 1px solid rgba(76,175,138,0.3); }
  .badge-warn  { background: rgba(224,92,92,0.12); color: var(--warn); border: 1px solid rgba(224,92,92,0.3); }

  /* ─── STAT CARDS ─── */
  .stats-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 16px; margin-bottom: 26px;
  }
  .stat-card {
    background: rgba(15,18,25,0.8); border: 1px solid var(--c5);
    border-radius: 4px; padding: 18px 20px;
    animation: fadeUp 0.5s ease both;
    position: relative; overflow: hidden;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--accent); opacity: 0.6;
  }
  .stat-card:nth-child(2)::before { background: var(--success); }
  .stat-card:nth-child(3)::before { background: var(--c3); }
  .stat-card:nth-child(4)::before { background: #a87ad6; }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem; color: var(--c4); letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 2rem; font-weight: 700; color: var(--c1); line-height: 1;
  }
  .stat-sub { font-size: 0.75rem; color: var(--c3); margin-top: 4px; }

  /* ─── PROGRESS BARS ─── */
  .progress-bar-wrap { margin-bottom: 12px; }
  .progress-bar-label {
    display: flex; justify-content: space-between;
    font-size: 0.78rem; color: var(--c3); margin-bottom: 5px;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
  }
  .progress-bar-track {
    height: 5px; background: var(--c5); border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; border-radius: 3px;
    animation: progressFill 1s 0.3s ease both;
    background: var(--accent);
  }

  /* ─── GRID LAYOUTS ─── */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
  @media(max-width: 900px) {
    .grid-2, .grid-3 { grid-template-columns: 1fr; }
    .stats-grid { grid-template-columns: 1fr 1fr; }
    .sidebar { width: 60px; }
    .sidebar-logo-text, .sidebar-nav-item span,
    .sidebar-user, .sidebar-header p { display: none; }
    .main-content { padding: 18px; }
    .main-header { padding: 16px 18px; }
  }

  /* ─── HUMAN BODY MODEL ─── */
  .body-model-container {
    display: flex; gap: 28px; align-items: flex-start; flex-wrap: wrap;
  }
  .body-svg-wrap {
    flex: 0 0 auto; position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .body-svg-wrap svg { cursor: default; }
  .body-part {
    fill: var(--c4); cursor: pointer;
    transition: fill 0.2s;
  }
  .body-part:hover { fill: var(--accent); filter: drop-shadow(0 0 6px var(--accent)); }
  .body-part.selected { fill: var(--accent); animation: bodypartGlow 2s infinite; }
  .body-part.affected { fill: #a87ad6; }
  .body-details { flex: 1; min-width: 200px; }
  .body-region-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 1.2rem; font-weight: 700; color: var(--c1);
    letter-spacing: 1px; margin-bottom: 8px;
  }
  .body-region-desc {
    font-size: 0.84rem; color: var(--c3); line-height: 1.7; margin-bottom: 16px;
  }
  .body-exercises { display: flex; flex-direction: column; gap: 8px; }
  .exercise-item {
    background: rgba(15,18,25,0.8); border: 1px solid var(--c5);
    border-left: 3px solid var(--accent);
    border-radius: 3px; padding: 10px 14px;
    font-size: 0.84rem; color: var(--c2);
    display: flex; align-items: center; justify-content: space-between;
  }
  .exercise-sets {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.68rem; color: var(--c4);
  }

  /* ─── CHAT / FORUM ─── */
  .chat-layout { display: flex; gap: 18px; height: 480px; }
  .chat-sidebar {
    width: 200px; flex-shrink: 0; overflow-y: auto;
    border-right: 1px solid var(--c5); padding-right: 14px;
  }
  .chat-channel {
    padding: 9px 12px; border-radius: 3px; cursor: pointer;
    font-size: 0.85rem; color: var(--c3); margin-bottom: 3px;
    transition: all 0.15s; display: flex; align-items: center; gap: 8px;
  }
  .chat-channel:hover { background: rgba(91,127,212,0.08); color: var(--c2); }
  .chat-channel.active { background: rgba(91,127,212,0.14); color: var(--c1); }
  .channel-badge {
    margin-left: auto; background: var(--accent); color: #fff;
    border-radius: 10px; font-size: 0.62rem; padding: 1px 6px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .chat-main { flex: 1; display: flex; flex-direction: column; }
  .chat-messages { flex: 1; overflow-y: auto; padding-right: 4px; margin-bottom: 14px; }
  .chat-msg { margin-bottom: 14px; animation: slideIn 0.2s ease; }
  .chat-msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .chat-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    background: linear-gradient(135deg, var(--c4), var(--c5));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif; font-size: 0.75rem; font-weight: 700;
    color: var(--c1); flex-shrink: 0;
    border: 1px solid var(--c4);
  }
  .chat-username {
    font-family: 'Rajdhani', sans-serif; font-weight: 600;
    font-size: 0.88rem; color: var(--c2); letter-spacing: 0.5px;
  }
  .chat-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.6rem; color: var(--c5);
  }
  .chat-text { font-size: 0.87rem; color: var(--c2); line-height: 1.6; padding-left: 38px; }
  .chat-input-row { display: flex; gap: 10px; }
  .chat-input-row input {
    flex: 1; background: var(--c6b); border: 1px solid var(--c5);
    border-radius: 3px; padding: 10px 14px;
    color: var(--c1); font-family: 'Exo 2', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .chat-input-row input:focus { border-color: var(--accent); }

  /* ─── UPDATES ─── */
  .update-item {
    border-left: 3px solid var(--c4);
    padding: 14px 16px; margin-bottom: 16px;
    background: rgba(15,18,25,0.6);
    border-radius: 0 3px 3px 0;
    animation: fadeUp 0.4s ease both;
  }
  .update-item:nth-child(1) { border-color: var(--accent); animation-delay: 0.05s; }
  .update-item:nth-child(2) { border-color: var(--success); animation-delay: 0.1s; }
  .update-item:nth-child(3) { border-color: var(--c3); animation-delay: 0.15s; }

  .qa-btn {

<body>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ── FAKE DB ──────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'rs_users_v1';
function getUsers() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch { return {}; }
}
function saveUser(email, data) {
  const users = getUsers();
  users[email] = data;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
}
function authUser(email, password) {
  const users = getUsers();
  return users[email] && users[email].password === password ? users[email] : null;
}

// ── ICONS ────────────────────────────────────────────────────────────────────
const icons = {
  home: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>,
  status: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/><path d="M12 14v2M9 19h6"/></svg>,

  feedback: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M11 4H4a2 2 0 00-2 2v14l4-4h14a2 2 0 002-2v-4"/><path d="M18 2l4 4-8 8H10v-4L18 2z"/></svg>,
  logout: <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>,
};

const LogoSVG = () => (
  <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="22" cy="22" r="18" stroke="#7e8caf" strokeWidth="1.5" fill="none"/>

    <path d="M34 22 l-3-4 M34 22 l4-2" stroke="#5b7fd4" strokeWidth="1.5" strokeLinecap="round"/>
    <text x="9" y="26" fontFamily="Rajdhani,sans-serif" fontWeight="700" fontSize="13" fill="#b0b9ce">RS</text>
    <path d="M10 28 Q14 24 18 28 Q22 32 26 28 Q30 24 34 28" stroke="#5b7fd4" strokeWidth="1.2" fill="none" opacity="0.7"/>

);

// ── CIRCUIT BACKGROUND ───────────────────────────────────────────────────────
const CircuitBG = () => (

const Notification = ({ msg, onDone }) => {
  useEffect(() => {
    const t = setTimeout(onDone, 3500);
    return () => clearTimeout(t);

      </h2>

      <button className="btn btn-primary" onClick={onLogin}>Sign In</button>
      <button className="btn btn-outline" onClick={onRegister}>Create Account</button>
    </div>
    <div className="demo-badge">
      <span>⚠ DEMO MODE</span> — Accounts exist only in your browser's local storage.<br />
      No data is transmitted or stored on any server.
    </div>
  </div>
);

// ── AUTH MODAL ────────────────────────────────────────────────────────────────
const AuthModal = ({ mode, onClose, onSuccess }) => {
  const [tab, setTab] = useState(mode);
  const [form, setForm] = useState({ name:'', email:'', password:'', confirm:'' });
  const [err, setErr] = useState('');

  const set = (k,v) => setForm(f => ({...f,[k]:v}));

  const handleLogin = () => {
    if (!form.email || !form.password) { setErr('Please fill all fields.'); return; }
    const user = authUser(form.email, form.password);
    if (!user) { setErr('Invalid email or password.'); return; }
    onSuccess(user);
  };

  const handleRegister = () => {
    if (!form.name || !form.email || !form.password || !form.confirm) { setErr('Please fill all fields.'); return; }
    if (form.password !== form.confirm) { setErr('Passwords do not match.'); return; }
    if (form.password.length < 4) { setErr('Password must be at least 4 characters.'); return; }
    if (getUsers()[form.email]) { setErr('An account with this email already exists.'); return; }
    const user = { name: form.name, email: form.email, password: form.password, joined: new Date().toISOString() };
    saveUser(form.email, user);
    onSuccess(user);
  };

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box">
        <button className="modal-close" onClick={onClose}>×</button>
        {tab === 'login' ? (
          <>
            <h2>Welcome Back</h2>
            <p className="subtitle">// log in to begin your recovery journey</p>
            <div className="modal-demo-note">
              <strong>DEMO NOTICE:</strong> Accounts are stored only in your browser.<br />
              They do not exist on any real server and are not shared.
            </div>
            <div className="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="user@example.com" value={form.email} onChange={e=>set('email',e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
            </div>
            <div className="form-group">
              <label>Password</label>
              <input type="password" placeholder="••••••••" value={form.password} onChange={e=>set('password',e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleLogin()} />
            </div>
            {err && <p className="form-error">{err}</p>}
            <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={handleLogin}>Sign In</button>
            <div className="modal-switch">
              No account? <button onClick={()=>{setTab('register');setErr('');}}>Create one</button>
            </div>
          </>
        ) : (
          <>
            <h2>Create Account</h2>
            <p className="subtitle">// start your recovery journey today</p>
            <div className="modal-demo-note">
              <strong>DEMO NOTICE:</strong> This account is <strong>not real</strong>.<br />
              Data is stored locally in your browser only. Do not use real passwords.
            </div>
            <div className="form-group">
              <label>Full Name</label>
              <input placeholder="John Doe" value={form.name} onChange={e=>set('name',e.target.value)} />
            </div>
            <div className="form-group">
              <label>Email Address</label>
              <input type="email" placeholder="user@example.com" value={form.email} onChange={e=>set('email',e.target.value)} />
            </div>
            <div className="form-group">
              <label>Password</label>
              <input type="password" placeholder="min. 4 characters" value={form.password} onChange={e=>set('password',e.target.value)} />
            </div>
            <div className="form-group">
              <label>Confirm Password</label>
              <input type="password" placeholder="repeat password" value={form.confirm} onChange={e=>set('confirm',e.target.value)} onKeyDown={e=>e.key==='Enter'&&handleRegister()} />
            </div>
            {err && <p className="form-error">{err}</p>}
            <button className="btn btn-primary" style={{width:'100%',marginTop:8}} onClick={handleRegister}>Create Account</button>
            <div className="modal-switch">
              Already have one? <button onClick={()=>{setTab('login');setErr('');}}>Sign in</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

          {[['Lower Back','78%','#5b7fd4'],['Right Knee','55%','#4caf8a'],['Shoulder','90%','#a87ad6'],['Ankle','32%','#e05c5c']].map(([l,w,c])=>(

            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

// ── ANALYZE VIEW ──────────────────────────────────────────────────────────────
const AnalyzeView = ({ notify }) => {
  const [conn, setConn] = useState(null);
  const [scanning, setScanning] = useState(false);
  const [data, setData] = useState(null);

  const devices = [
    { id:'wearable', label:'Smart Band', icon:'⌚', desc:'Bluetooth' },
    { id:'phone',    label:'Mobile App', icon:'📱', desc:'Wi-Fi Direct' },
    { id:'sensor',   label:'Motion Sensor', icon:'🔲', desc:'USB / BLE' },
    { id:'ecg',      label:'ECG Patch', icon:'🩺', desc:'Bluetooth LE' },
  ];

  const connect = (id) => {
    if (conn === id) return;
    setScanning(true); setData(null);
    setTimeout(() => {
      setConn(id); setScanning(false);
      setData({
        heartRate: 68 + Math.floor(Math.random()*20),
        steps: 4200 + Math.floor(Math.random()*3000),
        activeMin: 34 + Math.floor(Math.random()*30),
        calories: 1400 + Math.floor(Math.random()*500),
        sleep: (6.5 + Math.random()*1.5).toFixed(1),
        hrv: 42 + Math.floor(Math.random()*20),
        spo2: 96 + Math.floor(Math.random()*3),
        stress: ['Low','Moderate','Low'][Math.floor(Math.random()*3)],
      });
      notify({ title:'Device Connected', body:`${devices.find(d=>d.id===id).label} linked successfully.` });
    }, 1800);
  };

  return (
    <div className="section-enter">
      <div className="card" style={{marginBottom:20}}>
        <div className="card-header">
          <span className="card-title"><span className="dot dot-blue"/>Connect Recovery Device</span>
          {conn && <span className="card-badge badge-green">CONNECTED</span>}
        </div>
        <div className="analyze-devices">
          {devices.map(d=>(
            <div key={d.id} className={`device-card ${conn===d.id?'connected':''}`} onClick={()=>connect(d.id)}>
              <div className="device-icon">{d.icon}</div>
              <div className="device-name">{d.label}</div>
              <div className="device-status">{conn===d.id?'● Connected':d.desc}</div>
            </div>
          ))}
        </div>
        {scanning && (
          <div style={{textAlign:'center',padding:'20px 0',fontFamily:'IBM Plex Mono',fontSize:'0.75rem',color:'var(--c3)'}}>
            <div style={{width:28,height:28,border:'2px solid var(--c4)',borderTop:'2px solid var(--accent)',borderRadius:'50%',animation:'spin 0.8s linear infinite',margin:'0 auto 10px'}}/>
            Scanning for device...
          </div>
        )}
      </div>
      {data && (
        <div className="card section-enter">
          <div className="card-header">
            <span className="card-title"><span className="dot dot-green"/>Live Biometric Data</span>
            <span className="card-badge badge-green">LIVE</span>
          </div>
          <div className="analyze-data">
            {[
              ['Heart Rate', data.heartRate + ' bpm'],
              ['Steps Today', data.steps.toLocaleString()],
              ['Active Minutes', data.activeMin + ' min'],
              ['Calories', data.calories + ' kcal'],
              ['Sleep Duration', data.sleep + ' hrs'],
              ['HRV Score', data.hrv + ' ms'],
              ['SpO2', data.spo2 + '%'],
              ['Stress Level', data.stress],
            ].map(([l,v])=>(
              <div className="metric-row" key={l}>
                <span className="metric-label">{l}</span>
                <span className="metric-val">{v}</span>
              </div>
            ))}
          </div>
        </div>
      )}
      {!data && !scanning && (
        <div style={{textAlign:'center',padding:'40px 20px',color:'var(--c4)',fontFamily:'IBM Plex Mono',fontSize:'0.75rem'}}>
          Select a device above to begin data collection.
        </div>
      )}
    </div>
  );
};

const CommunityView = ({ user }) => {

  const bottomRef = useRef(null);

    const txt = input.trim();
    if (!txt) return;
    setMsgs(m => ({...m, [ch]: [...m[ch], {user: user.name, time: new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',hour12:false}), text: txt}]}));
    setInput('');
  };

  return (
    <div className="section-enter">

        <div className="card-header">

          <div className="chat-sidebar">
            <div style={{fontFamily:'IBM Plex Mono',fontSize:'0.6rem',color:'var(--c5)',letterSpacing:'2px',marginBottom:10}}>CHANNELS</div>

              <div key={c.id} className={`chat-channel ${ch===c.id?'active':''}`} onClick={()=>setCh(c.id)}>

// ── FEEDBACK VIEW ─────────────────────────────────────────────────────────────
const FeedbackView = ({ notify }) => {
  const [stars, setStars] = useState(0);
  const [hover, setHover] = useState(0);
  const [tags, setTags] = useState([]);
  const [form, setForm] = useState({category:'general',subject:'',message:''});
  const [sent, setSent] = useState(false);

  const tagOpts = ['Bug Report','Feature Request','UI / UX','Performance','Community','Recovery Data','Device Sync','Other'];

  const toggleTag = (t) => setTags(ts => ts.includes(t) ? ts.filter(x=>x!==t) : [...ts,t]);

  const submit = () => {
    if (!form.subject.trim() || !form.message.trim()) { notify({title:'Incomplete Form', body:'Please fill in subject and message.'}); return; }
    setSent(true);
    notify({title:'Feedback Sent!', body:'Thank you for helping improve RecoverySync.'});
  };

  if (sent) return (
    <div className="section-enter card" style={{textAlign:'center',padding:'60px 40px'}}>
      <div style={{fontSize:'3rem',marginBottom:16}}>✓</div>
      <div style={{fontFamily:'Rajdhani,sans-serif',fontSize:'1.4rem',fontWeight:700,color:'var(--success)',marginBottom:8}}>Feedback Submitted</div>
      <div style={{color:'var(--c3)',fontSize:'0.85rem',marginBottom:24}}>Thank you for helping make RecoverySync better. Our team reviews all submissions.</div>
      <button className="btn btn-outline btn-sm" onClick={()=>setSent(false)}>Submit More Feedback</button>
    </div>
  );

  return (
    <div className="section-enter">
      <div className="card">
        <div className="card-header">
          <span className="card-title"><span className="dot dot-blue"/>Send Feedback to Developers</span>
          <span className="card-badge badge-blue">DEV CHANNEL</span>
        </div>
        <div style={{color:'var(--c3)',fontSize:'0.82rem',marginBottom:20,fontFamily:'IBM Plex Mono',lineHeight:1.6}}>
          // Your feedback is read by the RecoverySync engineering team.<br/>
          // Help us prioritize what matters most to you.
        </div>

        <div style={{marginBottom:16}}>
          <div style={{fontFamily:'IBM Plex Mono',fontSize:'0.62rem',color:'var(--c4)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:10}}>Overall Rating</div>
          <div className="stars">
            {[1,2,3,4,5].map(n=>(
              <button key={n} className={`star-btn ${(hover||stars)>=n?'lit':''}`}
                onMouseEnter={()=>setHover(n)} onMouseLeave={()=>setHover(0)}
                onClick={()=>setStars(n)}>★</button>
            ))}
          </div>
        </div>

        <div style={{marginBottom:20}}>
          <div style={{fontFamily:'IBM Plex Mono',fontSize:'0.62rem',color:'var(--c4)',letterSpacing:'2px',textTransform:'uppercase',marginBottom:10}}>Category Tags</div>
          <div className="feedback-tags">
            {tagOpts.map(t=>(
              <div key={t} className={`feedback-tag ${tags.includes(t)?'sel':''}`} onClick={()=>toggleTag(t)}>{t}</div>
            ))}
          </div>
        </div>

        <div className="form-group">
          <label>Category</label>
          <select value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
            <option value="general">General Feedback</option>
            <option value="bug">Bug Report</option>
            <option value="feature">Feature Request</option>
            <option value="data">Data / Privacy</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div className="form-group">
          <label>Subject</label>
          <input placeholder="Brief summary of your feedback" value={form.subject} onChange={e=>setForm(f=>({...f,subject:e.target.value}))} />
        </div>
        <div className="form-group">
          <label>Message</label>
          <textarea placeholder="Describe your feedback in detail. Steps to reproduce bugs, specific feature requests, or anything else you'd like us to know..." value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} />
        </div>
        <button className="btn btn-primary" onClick={submit}>Submit Feedback</button>
      </div>
    </div>
  );
};

// ── MAIN APP ──────────────────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = useState('landing'); // landing | app
  const [authModal, setAuthModal] = useState(null); // null | 'login' | 'register'
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('overview');
  const [notif, setNotif] = useState(null);

  const notify = (msg) => { setNotif(msg); };

  const onAuthSuccess = (u) => {
    setUser(u); setAuthModal(null); setScreen('app'); setPage('overview');
    notify({ title:'Welcome, ' + u.name.split(' ')[0] + '!', body: 'Recovery journey resumed.' });
  };

  const navItems = [
    { id:'overview',   label:'Overview',  icon:icons.home },
    { id:'status',     label:'Status',    icon:icons.status },
    { id:'analyze',    label:'Analyze',   icon:icons.analyze },
    { id:'community',  label:'Community', icon:icons.community },
    { id:'updates',    label:'Updates',   icon:icons.updates },
    { id:'feedback',   label:'Feedback',  icon:icons.feedback },
  ];

  const pageTitles = { overview:'Dashboard Overview', status:'Body Status', analyze:'Device Analysis', community:'Community Forum', updates:'System Updates', feedback:'Send Feedback' };

  const renderPage = () => {
    switch(page) {
      case 'overview':   return <OverviewView user={user} setPage={setPage}/>;
      case 'status':     return <StatusView/>;
      case 'analyze':    return <AnalyzeView notify={notify}/>;
      case 'community':  return <CommunityView user={user}/>;
      case 'updates':    return <UpdatesView/>;
      case 'feedback':   return <FeedbackView notify={notify}/>;
      default:           return null;
    }
  };

  if (screen === 'landing') return (
    <>
      <div className="scanline-overlay"/>
      <LandingPage onLogin={()=>setAuthModal('login')} onRegister={()=>setAuthModal('register')}/>
      {authModal && <AuthModal mode={authModal} onClose={()=>setAuthModal(null)} onSuccess={onAuthSuccess}/>}
      {notif && <Notification msg={notif} onDone={()=>setNotif(null)}/>}
    </>
  );

  return (
    <>
      <div className="scanline-overlay"/>
      <div className="app-shell">
        {/* SIDEBAR */}
        <nav className="sidebar">
          <div className="sidebar-header">
            <div className="sidebar-logo">
              <div className="logo-icon"><LogoSVG/></div>
              <div className="sidebar-logo-text">
                <h3>Recovery<span>Sync</span></h3>
                <p>LENOVO PLATFORM</p>
              </div>
            </div>
          </div>
          <div className="sidebar-user">
            <p>LOGGED IN AS</p>
            <strong>{user?.name || 'User'}</strong>
          </div>
          <div className="sidebar-nav">
            {navItems.map(n=>(
              <div key={n.id} className={`sidebar-nav-item ${page===n.id?'active':''}`} onClick={()=>setPage(n.id)}>
                <span className="sidebar-nav-icon">{n.icon}</span>
                <span>{n.label}</span>
              </div>
            ))}
          </div>
          <div className="sidebar-footer">
            <div className="sidebar-nav-item" onClick={()=>{setUser(null);setScreen('landing');}} style={{color:'var(--warn)'}}>
              <span className="sidebar-nav-icon">{icons.logout}</span>
              <span>Sign Out</span>
            </div>
          </div>
        </nav>

        {/* MAIN */}
        <main className="main-area">
          <div className="main-header">
            <div>
              <h1>{pageTitles[page]}</h1>
              <div className="breadcrumb">RecoverySync / {pageTitles[page]}</div>
            </div>
            <div className="header-actions">
              <div className="status-indicator">
                <span className="dot dot-green"/>System Online
              </div>
              <button className="btn btn-outline btn-sm" onClick={()=>setPage('feedback')}>✏ Feedback</button>
            </div>
          </div>
          <div className="main-content">
            {renderPage()}
          </div>
        </main>
      </div>
      {notif && <Notification msg={notif} onDone={()=>setNotif(null)}/>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
